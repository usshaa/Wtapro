<script>

function goToCoach() {
    window.location.href = "/coach-page/";
}

function login() {

    let name = document.getElementById("name").value.trim().toLowerCase();
    let pass = document.getElementById("pass").value;

    let headCoach = {
    "admin": "9840"
    };

    let valid = {
    "veslin wta": "1751",
    "dani wta": "2074",
    "sujith wta": "8724",
    "eso wta": "3097",
    "mathesh wta": "9856",
    "jesurajan wta": "3682",
    "wta": "1111"
    };

    // HEAD COACH LOGIN
    if (headCoach[name] === pass) {

        localStorage.setItem("headCoach", name);

        window.location.href = "/admin-page/";
    }

    // NORMAL COACH LOGIN
    else if (valid[name] === pass) {

        localStorage.setItem("coachName", name);

       document.getElementById("loginScreen").style.display = "none";

        loadStudents();
    }

    else {

        document.getElementById("error").innerText =
        "Invalid login!";
    }
}


function togglePassword(){

    const password = document.getElementById("pass");

    if(password.type === "password"){
        password.type = "text";
    }else{
        password.type = "password";
    }

}


let students = [];

function loadStudents() {

    let coach = localStorage.getItem("coachName");

    if (!coach) return;

    fetch(`/students/?coach=${encodeURIComponent(coach)}`)
        .then(res => res.json())
        .then(data => {

            students = data;
            renderTable(data);

        })
        .catch(error => console.log(error));
}







//  Render table
function renderTable(data) {
    let html = "";

    data.forEach(s => {
        html += `
        <tr class="student-row">

            <td class="student-name">${s.name}</td>

            <td class="toggle-box">
                <span class="label">Present</span>
                <label class="switch">
                    <input type="checkbox" id="att_${s._id}">
                    <span class="slider"></span>
                </label>
            </td>

            <td class="toggle-box">
                <span class="label">Paid</span>
                <label class="switch fee-switch">
                    <input type="checkbox" id="fee_${s._id}">
                    <span class="slider"></span>
                </label>
                <input type="file" id="file_${s._id}" style="display:none;" accept="image/*">
            </td>

        </tr>
        `;
    });

    document.getElementById("tableBody").innerHTML = html;

    data.forEach(s => {

    document
    .getElementById("fee_" + s._id)
    .addEventListener("click", function(e){

        e.preventDefault();

        openFile(s._id);

    });

});

}

function openFile(id) {

    const checkbox = document.getElementById("fee_" + id);

    const fileInput = document.getElementById("file_" + id);

    checkbox.checked = false;

    fileInput.value = "";

    fileInput.click();

    fileInput.onchange = function () {

        if (fileInput.files.length > 0) {

            checkbox.checked = true;

        } else {

            checkbox.checked = false;

        }

    };

}

function submitData() {

    students.forEach(s => {

        let attendanceEl = document.getElementById("att_" + s._id);
        let feeEl = document.getElementById("fee_" + s._id);
        let fileInput = document.getElementById("file_" + s._id);

        let attendance = attendanceEl.checked;
        let fee = feeEl.checked;


fetch("/attendance/", { 
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
        studentId: s._id,
        present: attendance
    })
});


if (fee) {

    let file = fileInput.files[0];

  

    if (!file) {

        showAlert("Upload payment proof for " + s.name);

        return;
    }


    let reader = new FileReader();

    reader.onloadend = function () {

        fetch("/fees/", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                studentId: s._id,
                month: new Date().toISOString().slice(0, 7),
                proof: reader.result
            })
        }).then(() => {

            console.log("Fees sent with image for", s.name);

        });

    };

    reader.readAsDataURL(file);
}

});
showAlert(" Attendance saved!");

setTimeout(() => {

    document.body.style.transition = "0.4s";
    document.body.style.opacity = "0.6";

    setTimeout(() => {

        document.body.style.opacity = "1";

        students.forEach(s => {

            document.getElementById("att_" + s._id).checked = false;
            document.getElementById("fee_" + s._id).checked = false;

            document.getElementById("file_" + s._id).value = "";

        });

    }, 500);

}, 1200);
}

// sort & search
function searchStudent(value) {
    let filtered = students.filter(s =>
        s.name.toLowerCase().includes(value.toLowerCase())
    );

    renderTable(filtered);
}


function sortStudents(type) {

    let sorted = [...students];

    if (type === "az") {

        sorted.sort((a, b) =>
            a.name.localeCompare(b.name)
        );

    }

    else if (type === "new") {

        sorted.sort((a, b) =>
            new Date(b.joinDate) -
            new Date(a.joinDate)
        );

    }

    else if (type === "batch1") {

    sorted = students.filter(
        s => String(s.batch).toLowerCase().includes("1")
    );

}

else if (type === "batch2") {

    sorted = students.filter(
        s => String(s.batch).toLowerCase().includes("2")
    );

}

 else if (type === "morning") {

    sorted = students.filter(
        s => s.session === "Morning"
    );

}

else if (type === "evening") {

    sorted = students.filter(
        s => s.session === "Evening"
    );

}


else if (type === "courtA") {

    sorted = students.filter(
        s => s.court === "A"
    );

}

else if (type === "courtB") {

    sorted = students.filter(
        s => s.court === "B"
    );

}

    else if (type === "all") {

        sorted = [...students];

    }

    renderTable(sorted);
}





function toggleSortMenu(){

    document.getElementById("sortMenu").style.display = "block";

}

function closeSortMenu(){

    document.getElementById("sortMenu").style.display = "none";

}






window.addEventListener("click", function(e){

    if(!e.target.closest(".sort-dropdown")){

        document.getElementById("sortMenu").style.display = "none";

    }

});





const toggle = document.getElementById("themeToggle");

toggle.addEventListener("change", () => {

  if(toggle.checked){
    document.body.classList.add("dark-mode");
  } else {
    document.body.classList.remove("dark-mode");
  }

});









function showAlert(message){

    const alertBox = document.createElement("div");

    alertBox.className = "custom-alert";
    alertBox.innerText = message;

    document.body.appendChild(alertBox);

    setTimeout(() => {
        alertBox.remove();
    }, 1200);
}














function showFeeStatus(){

    let coach =
    localStorage.getItem("coachName");

    fetch(
        `/coach-fee-status/?coach=${coach}`
    )

    .then(res => res.json())

    .then(data => {

    console.log("Fee Status:", data);

        let html = `
        <div class="card">

            <h3>
                Pending Fees
            </h3>
        `;

        if(data.length === 0){

            html += `
            <p>
            🎉 All fees paid
            </p>
            `;

        }else{

            data.forEach(s => {

                html += `
                <p>
                ❌ ${s.name}
                </p>
                `;

            });

        }

        html += `</div>`;

        document
        .querySelector(".student-list")
        .innerHTML = html;

    });

}

    let coach = localStorage.getItem("coachName");

    if (!coach) {
        document.getElementById("loginScreen").style.display = "flex";
    } else {

    }
};
